<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASAA Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f4f6f5;}
header{background:#1b5e20;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}

.cart{
position:relative;
cursor:pointer;
font-size:24px;
}

/* CART BADGE */
.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

.tabs{display:flex;background:white;}
.tabs button{flex:1;padding:12px;border:none;background:#eee;font-weight:600;cursor:pointer;}
.tabs .active{background:#1b5e20;color:white;}

.container{padding:20px;}

.product{
background:white;padding:15px;margin-bottom:15px;border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);display:flex;gap:15px;align-items:center;
}
.product img{width:90px;height:90px;border-radius:10px;cursor:pointer;}

.qty{display:flex;gap:5px;margin-top:5px;}
.qty button{padding:5px 10px;}

.btn{
background:#1b5e20;color:white;padding:10px;border:none;border-radius:8px;
margin-top:10px;width:100%;cursor:pointer;
}

.remove{
background:#c62828;color:white;padding:5px 10px;border:none;border-radius:6px;
cursor:pointer;margin-left:10px;
}

input,textarea{
width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;
}

.back{cursor:pointer;color:#1b5e20;font-weight:bold;}
</style>
</head>

<body>

<header>
<h2>VASAA Products</h2>

<div class="cart" onclick="openCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

</header>

<div class="tabs">
<button class="active" onclick="showTab('about')">About</button>
<button onclick="showTab('products')">Products</button>
</div>

<div class="container" id="content"></div>

<script>
let cart=[];
let userData={};

/* UPDATE CART COUNT */
function updateCartCount(){
let count=0;
cart.forEach(i=>count+=i.qty);
document.getElementById("cartCount").innerText=count;
}

/* TAB */
function showTab(tab){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');

if(tab==='about'){
content.innerHTML=`
<h3>About of VASAA Products</h3>
<p>VASAA brings you homemade, organic, and healthy products crafted with care and purity.</p>
<p>From nourishing hair oil to naturally made amla candies, every product supports a healthier lifestyle.</p>
<p>Our mission is simple — help you live naturally, beautifully, and healthily every day.</p>`;
}

if(tab==='products'){
content.innerHTML=`
${productCard(0,"VASAA Hair Care Oil",333,"ChatGPT Image Apr 22, 2026, 11_50_45 AM.png")}
${productCard(1,"Amla Candy (Jaggery)",92,"Gemini_Generated_Image_ey3f11ey3f11ey3f.png")}
${productCard(2,"Amla Candy (Sugar)",92,"Gemini_Generated_Image_9ufpb19ufpb19ufp.png")}
`;
}
}

/* PRODUCT CARD */
function productCard(id,name,price,img){
return `
<div class="product">
<img src="${img}" onclick="viewProduct(${id})">
<div>
<b onclick="viewProduct(${id})">${id+1}. ${name} - ₹${price}</b>
<div class="qty">
<button onclick="changeQty(${id},-1)">-</button>
<span id="q${id}">0</span>
<button onclick="changeQty(${id},1)">+</button>
</div>
<button class="btn" onclick="addCart(${id},${price},'${name}')">Add to Cart</button>
</div>
</div>`;
}

/* QUANTITY */
function changeQty(id,val){
let q=document.getElementById("q"+id);
let v=parseInt(q.innerText)+val;
if(v<0) v=0;
q.innerText=v;
}

/* PRODUCT VIEW */
function viewProduct(id){
let html=`<span class="back" onclick="showTab('products')">⬅ Back</span>`;

if(id==0){
html+=`
<h3>VASAA Hair Care Oil</h3>
<img src="ChatGPT Image Apr 22, 2026, 11_50_45 AM.png" width="200">
<h4>Ingredients</h4>
<ol><li>Coconuts</li><li>Almonds</li><li>Rosemary Leaves</li><li>Fenugreek Seeds</li></ol>
<h4>How to use</h4>
<ol><li>Apply based on hair length</li><li>Massage Gently</li><li>Leave overnight</li><li>Wash</li></ol>
<h4>Benefits</h4>
<ol><li>Hair Growth</li><li>Controls Hairfall</li><li>Nourishes Hair</li><li>Strong Roots</li></ol>`;
}

if(id==1 || id==2){
html+=`
<h3>${id==1?'Amla Candy (Jaggery)':'Amla Candy (Sugar)'}</h3>
<img src="${id==1?'Gemini_Generated_Image_ey3f11ey3f11ey3f.png':'Gemini_Generated_Image_9ufpb19ufpb19ufp.png'}" width="200">
<h4>Ingredients</h4>
<ol><li>Amla</li><li>${id==1?'Jaggery':'Sugar'}</li></ol>
<h4>Benefits</h4>
<ol><li>Digestion</li><li>Immunity</li><li>Skin & Hair</li><li>Cholesterol</li></ol>`;
}

content.innerHTML=html;
}

/* ADD CART */
function addCart(id,price,name){
let qty=parseInt(document.getElementById("q"+id).innerText);

if(qty<=0){
alert("Please add at least 1 quantity");
return;
}

cart.push({name,price,qty});
updateCartCount();
alert("Added to cart");
}

/* REMOVE ITEM */
function removeItem(index){
cart.splice(index,1);
updateCartCount();
openCart();
}

/* CART */
function openCart(){
let total=0,html="<h3>Cart</h3>";

if(cart.length===0){
content.innerHTML="<h3>Your cart is empty</h3>";
return;
}

cart.forEach((i,index)=>{
total+=i.price*i.qty;
html+=`<p>${i.name} x ${i.qty}
<button class="remove" onclick="removeItem(${index})">Remove</button>
</p>`;
});

html+=`<h4>Total ₹${total}</h4>
<button class="btn" onclick="addressPage(${total})">Proceed</button>`;

content.innerHTML=html;
}

/* ADDRESS */
function addressPage(total){
content.innerHTML=`
<h3>Address</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="addr" placeholder="Address"></textarea>
<input id="pin" placeholder="Pincode">
<button class="btn" onclick="saveAddress(${total})">Next</button>`;
}

function saveAddress(total){
let nameVal=document.getElementById("name").value.trim();
let phoneVal=document.getElementById("phone").value.trim();
let addrVal=document.getElementById("addr").value.trim();
let pinVal=document.getElementById("pin").value.trim();

if(!nameVal||!phoneVal||!addrVal||!pinVal){
alert("Please fill all fields");
return;
}

userData={name:nameVal,phone:phoneVal,addr:addrVal,pin:pinVal};

couponPage(total);
}

/* COUPON */
function couponPage(total){
content.innerHTML=`
<h3>Coupon</h3>
<input id="coupon" placeholder="Enter Coupon">
<p>Use GEETHA11 for 10% discount</p>
<button class="btn" onclick="checkout(${total})">Next</button>`;
}

/* CHECKOUT */
function checkout(total){
let coupon=document.getElementById("coupon").value;

if(coupon==="GEETHA11") total*=0.9;

/* UPDATED SHIPPING LOGIC */
let shipping = total <= 500 ? 80 : 60;

let final=Math.round(total+shipping);

let items="";
cart.forEach(i=>{items+=`${i.name} x ${i.qty}\n`;});

let name=userData.name||"Customer";

let msg=`VASAA Products Order

Name: ${name}
Phone: ${userData.phone}
Address: ${userData.addr}
Pincode: ${userData.pin}

Items:
${items}

Total: ₹${final}`;

let url=`https://wa.me/918978992637?text=${encodeURIComponent(msg)}`;

content.innerHTML=`
<h3>Checkout</h3>
<p>Subtotal ₹${Math.round(total)}</p>
<p>Shipping ₹${shipping}</p>
<h4>Total ₹${final}</h4>

<a href="${url}" target="_blank">
<button class="btn">Confirm on WhatsApp</button>
</a>`;
}

/* INIT */
showTab('about');
</script>

</body>
</html>
