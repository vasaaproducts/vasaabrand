<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASAA Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#f6f6f6;
}

/* HEADER */
header{
  background:#2e7d32;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{margin:0;}
.cart{
  cursor:pointer;
  font-size:22px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  background:white;
}
.tabs button{
  flex:1;
  padding:12px;
  border:none;
  background:#eee;
  cursor:pointer;
  font-weight:600;
}
.tabs button.active{
  background:#2e7d32;
  color:white;
}

/* CONTENT */
.container{
  padding:20px;
}

/* PRODUCT LIST */
.product{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  display:flex;
  gap:15px;
  align-items:center;
}
.product img{
  width:90px;
  height:90px;
  border-radius:10px;
}
.qty{
  display:flex;
  align-items:center;
  gap:5px;
}
.qty button{
  padding:5px 10px;
  font-size:16px;
}

/* BUTTON */
.btn{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* BACK */
.back{
  cursor:pointer;
  margin-bottom:10px;
  display:inline-block;
}

/* FORM */
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>VASAA Products</h1>
<div class="cart" onclick="openCart()">🛒</div>
</header>

<div class="tabs">
<button class="active" onclick="showTab('about')">About</button>
<button onclick="showTab('products')">Products</button>
</div>

<div class="container" id="content"></div>

<script>
let cart=[];

/* TAB SWITCH */
function showTab(tab){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');

if(tab==='about'){
content.innerHTML=`
<h3>About of VASAA Products</h3>
<p>VASAA brings you homemade, organic, and healthy products crafted with care and purity.</p>
<p>From nourishing hair oil to naturally made amla candies, every product supports a healthier lifestyle.</p>
<p>Our mission is simple — help you live naturally, beautifully, and healthily every day.</p>`;
}

if(tab==='products'){
content.innerHTML=`
<div class="product">
<img src="ChatGPT Image Apr 22, 2026, 11_50_45 AM.png">
<div>
<b>1. VASAA Hair Care Oil - ₹333</b>
<div class="qty">
<button onclick="changeQty(0,-1)">-</button>
<span id="q0">1</span>
<button onclick="changeQty(0,1)">+</button>
</div>
<button class="btn" onclick="viewProduct(0)">View</button>
<button class="btn" onclick="addCart(0,333)">Add</button>
</div>
</div>

<div class="product">
<img src="Gemini_Generated_Image_ey3f11ey3f11ey3f.png">
<div>
<b>2. Amla Candy (Jaggery) - ₹92</b>
<div class="qty">
<button onclick="changeQty(1,-1)">-</button>
<span id="q1">1</span>
<button onclick="changeQty(1,1)">+</button>
</div>
<button class="btn" onclick="viewProduct(1)">View</button>
<button class="btn" onclick="addCart(1,90)">Add</button>
</div>
</div>

<div class="product">
<img src="Gemini_Generated_Image_9ufpb19ufpb19ufp.png">
<div>
<b>3. Amla Candy (Sugar) - ₹92</b>
<div class="qty">
<button onclick="changeQty(2,-1)">-</button>
<span id="q2">1</span>
<button onclick="changeQty(2,1)">+</button>
</div>
<button class="btn" onclick="viewProduct(2)">View</button>
<button class="btn" onclick="addCart(2,90)">Add</button>
</div>
</div>`;
}
}

/* QUANTITY */
function changeQty(id,val){
let q=document.getElementById("q"+id);
let v=parseInt(q.innerText)+val;
if(v<1) v=1;
q.innerText=v;
}

/* VIEW PRODUCT */
function viewProduct(id){
let html=`<span class="back" onclick="showTab('products')">⬅ Back</span>`;

if(id==0){
html+=`
<h3>VASAA Hair Care Oil</h3>
<img src="ChatGPT Image Apr 22, 2026, 11_50_45 AM.png">
<h4>Ingredients</h4>
<ol><li>Coconuts</li><li>Almonds</li><li>Rosemary Leaves</li><li>Fenugreek Seeds</li></ol>
<h4>How to use</h4>
<ol><li>Apply based on hair length</li><li>Massage Gently</li><li>Leave for 2 hours or overnight</li><li>Rinse with lukewarm water</li></ol>
<h4>Benefits</h4>
<ol><li>Promotes Hair Growth</li><li>Controls Hairfall & Dandruff</li><li>Nourishes Hair</li><li>Strengthens Roots</li></ol>`;
}

if(id==1 || id==2){
html+=`
<h3>Amla Candy</h3>
<img src="Gemini_Generated_Image_ey3f11ey3f11ey3f.png">
<img src="Gemini_Generated_Image_9ufpb19ufpb19ufp.png">
<h4>Ingredients</h4>
<ol><li>Amla</li><li>${id==1?'Jaggery':'Sugar'}</li></ol>
<h4>Benefits</h4>
<ol><li>Good For Digestion</li><li>Boosts Immunity</li><li>Improves Skin & Hair</li><li>Manages Cholesterol</li></ol>`;
}

content.innerHTML=html;
}

/* ADD CART */
function addCart(id,price){
let qty=parseInt(document.getElementById("q"+id).innerText);
cart.push({id,price,qty});
alert("Added to cart");
}

/* CART PAGE */
function openCart(){
let total=0;
let html="<h3>Cart</h3>";

cart.forEach(item=>{
total+=item.price*item.qty;
html+=`<p>Item ${item.id+1} x ${item.qty}</p>`;
});

html+=`<h4>Total ₹${total}</h4>
<button class="btn" onclick="addressPage(${total})">Proceed to Buy</button>`;

content.innerHTML=html;
}

/* ADDRESS */
function addressPage(total){
content.innerHTML=`
<h3>Address</h3>
<input placeholder="Name" id="name">
<input placeholder="Phone" id="phone">
<textarea placeholder="Address" id="addr"></textarea>
<input placeholder="Pincode" id="pin">
<button class="btn" onclick="couponPage(${total})">Next</button>`;
}

/* COUPON */
function couponPage(total){
content.innerHTML=`
<h3>Coupon</h3>
<input placeholder="Enter Coupon Code" id="coupon">
<p>Use GEETHA11 for 10% discount</p>
<button class="btn" onclick="checkout(${total})">Next</button>`;
}

/* CHECKOUT */
function checkout(total){
let coupon=document.getElementById("coupon").value;
if(coupon=="GEETHA11") total*=0.9;

let shipping= total>=500?70:100;
let final=total+shipping;

content.innerHTML=`
<h3>Checkout</h3>
<p>Subtotal ₹${total.toFixed(0)}</p>
<p>Shipping ₹${shipping}</p>
<h4>Total ₹${final}</h4>
<button class="btn" onclick="whatsappOrder(${final})">Confirm on WhatsApp</button>`;
}

/* WHATSAPP */
function whatsappOrder(amount){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let addr=document.getElementById("addr").value;

let msg=`Order Details:%0AName:${name}%0APhone:${phone}%0AAddress:${addr}%0ATotal:${amount}`;

window.open(`https://wa.me/918978992637?text=${msg}`);

content.innerHTML="<h2>Order Confirmed 🎉</h2>";
}
/* DEFAULT */
showTab('about');
</script>

</body>
</html>
