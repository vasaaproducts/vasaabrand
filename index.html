<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASAA Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f4f6f5;}
header{background:#1b5e20;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;}
.cart{cursor:pointer;font-size:22px;}

.tabs{display:flex;background:white;}
.tabs button{flex:1;padding:12px;border:none;background:#eee;cursor:pointer;font-weight:600;}
.tabs button.active{background:#1b5e20;color:white;}

.container{padding:20px;}

.product{
background:white;padding:15px;margin-bottom:15px;border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);display:flex;gap:15px;align-items:center;
}
.product img{width:90px;height:90px;border-radius:10px;cursor:pointer;}
.product b{cursor:pointer;}

.qty{display:flex;align-items:center;gap:5px;margin-top:5px;}
.qty button{padding:4px 10px;font-size:16px;}

.btn{
background:#1b5e20;color:white;padding:10px;border:none;border-radius:8px;
cursor:pointer;margin-top:8px;width:100%;
}

.back{cursor:pointer;margin-bottom:10px;display:inline-block;color:#1b5e20;font-weight:bold;}

input,textarea{
width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>VASAA Products</h1>
<div class="cart" onclick="openCart()">🛒</div>
</header>

<div class="tabs">
<button class="active" onclick="showTab('about')">About</button>
<button onclick="showTab('products')">Products</button>
</div>

<div class="container" id="content"></div>

<script>
let cart=[];
let userData={};

/* TAB */
function showTab(tab){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');

if(tab==='about'){
content.innerHTML=`
<h3>About of VASAA Products</h3>
<p>VASAA brings you homemade, organic, and healthy products crafted with care and purity.</p>
<p>From nourishing hair oil to naturally made amla candies, every product supports a healthier lifestyle.</p>
<p>Our mission is simple — help you live naturally, beautifully, and healthily every day.</p>`;
}

if(tab==='products'){
content.innerHTML=`
${productCard(0,"VASAA Hair Care Oil",333,"ChatGPT Image Apr 22, 2026, 11_50_45 AM.png")}
${productCard(1,"Amla Candy (Jaggery)",92,"Gemini_Generated_Image_ey3f11ey3f11ey3f.png")}
${productCard(2,"Amla Candy (Sugar)",92,"Gemini_Generated_Image_9ufpb19ufpb19ufp.png")}
`;
}
}

/* PRODUCT CARD */
function productCard(id,name,price,img){
return `
<div class="product">
<img src="${img}" onclick="viewProduct(${id})">
<div>
<b onclick="viewProduct(${id})">${id+1}. ${name} - ₹${price}</b>
<div class="qty">
<button onclick="changeQty(${id},-1)">-</button>
<span id="q${id}">1</span>
<button onclick="changeQty(${id},1)">+</button>
</div>
<button class="btn" onclick="addCart(${id},${price},'${name}')">Add to Cart</button>
</div>
</div>`;
}

/* QUANTITY */
function changeQty(id,val){
let q=document.getElementById("q"+id);
let v=parseInt(q.innerText)+val;
if(v<1) v=1;
q.innerText=v;
}

/* PRODUCT DETAILS */
function viewProduct(id){
let html=`<span class="back" onclick="showTab('products')">⬅ Back</span>`;

if(id==0){
html+=`
<h3>VASAA Hair Care Oil</h3>
<img src="ChatGPT Image Apr 22, 2026, 11_50_45 AM.png" width="200">
<h4>Ingredients</h4>
<ol><li>Coconuts</li><li>Almonds</li><li>Rosemary Leaves</li><li>Fenugreek Seeds</li></ol>
<h4>How to use</h4>
<ol><li>Apply based on hair length</li><li>Massage Gently</li><li>Leave 2 hrs or overnight</li><li>Rinse with lukewarm water</li></ol>
<h4>Benefits</h4>
<ol><li>Promotes Hair Growth</li><li>Controls Hairfall & Dandruff</li><li>Nourishes Hair</li><li>Strengthens Roots</li></ol>`;
}

if(id==1){
html+=`
<h3>Amla Candy (Jaggery)</h3>
<img src="Gemini_Generated_Image_ey3f11ey3f11ey3f.png" width="200">
<h4>Ingredients</h4>
<ol><li>Amla</li><li>Jaggery</li></ol>
<h4>Benefits</h4>
<ol><li>Good For Digestion</li><li>Boosts Immunity</li><li>Improves Skin & Hair</li><li>Manages Cholesterol</li></ol>`;
}

if(id==2){
html+=`
<h3>Amla Candy (Sugar)</h3>
<img src="Gemini_Generated_Image_9ufpb19ufpb19ufp.png" width="200">
<h4>Ingredients</h4>
<ol><li>Amla</li><li>Sugar</li></ol>
<h4>Benefits</h4>
<ol><li>Good For Digestion</li><li>Boosts Immunity</li><li>Improves Skin & Hair</li><li>Manages Cholesterol</li></ol>`;
}

content.innerHTML=html;
}

/* ADD CART */
function addCart(id,price,name){
let qty=parseInt(document.getElementById("q"+id).innerText);
cart.push({name,price,qty});
alert("Added to cart");
}

/* CART */
function openCart(){
let total=0;
let html="<h3>Cart</h3>";

cart.forEach(item=>{
total+=item.price*item.qty;
html+=`<p>${item.name} x ${item.qty}</p>`;
});

html+=`<h4>Total ₹${total}</h4>
<button class="btn" onclick="addressPage(${total})">Proceed to Buy</button>`;

content.innerHTML=html;
}

/* ADDRESS */
function addressPage(total){
content.innerHTML=`
<h3>Address</h3>
<input placeholder="Name" id="name">
<input placeholder="Phone" id="phone">
<textarea placeholder="Address" id="addr"></textarea>
<input placeholder="Pincode" id="pin">
<button class="btn" onclick="saveAddress(${total})">Next</button>`;
}

function saveAddress(total){
userData.name=name.value;
userData.phone=phone.value;
userData.addr=addr.value;
userData.pin=pin.value;

couponPage(total);
}

/* COUPON */
function couponPage(total){
content.innerHTML=`
<h3>Coupon</h3>
<input placeholder="Enter Coupon Code" id="coupon">
<p><b>Use GEETHA11</b> for 10% discount</p>
<button class="btn" onclick="checkout(${total})">Next</button>`;
}

/* CHECKOUT */
function checkout(total){
let coupon=document.getElementById("coupon").value;

if(coupon==="GEETHA11") total=total*0.9;

let shipping = total>=500 ? 70 : 100;
let final = Math.round(total+shipping);

let items="";
cart.forEach(i=>{
items+=`${i.name} x ${i.qty}%0A`;
});

let message=`*VASAA Order*%0A${items}%0AName: ${userData.name}%0APhone: ${userData.phone}%0AAddress: ${userData.addr} - ${userData.pin}%0ATotal: ₹${final}`;

content.innerHTML=`
<h3>Checkout</h3>
<p>Subtotal ₹${Math.round(total)}</p>
<p>Shipping ₹${shipping}</p>
<h4>Total ₹${final}</h4>

<a href="https://wa.me/918978992637?text=${message}" target="_blank">
<button class="btn">Confirm on WhatsApp</button>
</a>`;
}

/* DEFAULT */
showTab('about');
</script>

</body>
</html>
